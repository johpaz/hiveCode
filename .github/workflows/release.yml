name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: hive-code-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: hive-code-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: hive-code-macos-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: hive-code-macos-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: hive-code-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate skill bundles
        run: bun packages/skills/scripts/generate-bundle.ts

      - name: Build binary
        run: |
          bun build packages/cli/src/index.ts \
            --compile \
            --target ${{ matrix.target }} \
            --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
