[package]
name = "hivecode-tui"
version = "0.1.0"
edition = "2021"

[dependencies]
ratatui      = "0.29"
crossterm    = { version = "0.28", features = ["event-stream"] }
tui-big-text = "0.7"
color-eyre   = "0.6"
tokio        = { version = "1", features = ["full"] }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
futures      = "0.3"
textwrap     = "0.16"

[profile.release]
strip         = true
lto           = true
codegen-units = 1
