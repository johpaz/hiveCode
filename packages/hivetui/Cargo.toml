[package]
name = "hivetui"
version = "0.1.0"
edition = "2021"

[dependencies]
color-eyre = "0.6"
crossterm = { version = "0.28", features = ["event-stream"] }
serde = { version = "1", features = ["derive"] }
sonic-rs = "0.3"
tokio = { version = "1", features = ["full"] }
unicode-width = "0.1"
futures = "0.3"
base64 = "0.22"
chrono = "0.4"
arboard = "3"

[profile.release]
strip = true
lto = true
codegen-units = 1
